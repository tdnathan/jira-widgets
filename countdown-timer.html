<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --card-top: #393939;
    --card-bot: #3e3e3e;
    --card-text: #ffffff;
    --card-divider: rgba(0,0,0,0.35);
    --title-color: #1b2a4a;
    --subtitle-color: #5a6a7a;
    --label-color: #5a6a7a;
    --accent: #2e8b57;
    --accent-bar: #3aaf6e;
    --dot-color: #1b2a4a;
    --expired-color: #d9534f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--title-color);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .widget {
    width: 100%;
    text-align: center;
    container-type: inline-size;
  }

  /* ── Accent bar ── */
  .accent-bar {
    height: 5px;
    background: var(--accent-bar);
    border-radius: 3px 3px 0 0;
    margin-bottom: 20px;
  }

  /* ── Title / subtitle ── */
  .title {
    font-size: clamp(14px, 3cqi, 28px);
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--title-color);
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: clamp(10px, 1.8cqi, 16px);
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--subtitle-color);
    margin-bottom: clamp(16px, 3cqi, 32px);
  }

  /* ── Countdown row ── */
  .countdown {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: clamp(2px, 0.8cqi, 8px);
    padding: 0 clamp(4px, 1cqi, 16px);
    container-type: inline-size;
  }

  .digit-group {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .digit-row {
    display: flex;
    gap: clamp(2px, 0.5cqi, 6px);
  }

  .group-label {
    font-size: clamp(8px, 1.5cqi, 15px);
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--label-color);
    margin-top: clamp(4px, 0.8cqi, 10px);
  }

  /* ── Individual digit card ── */
  .flip-card {
    position: relative;
    width: clamp(28px, 9cqi, 100px);
    aspect-ratio: 3 / 4;
    perspective: 600px;
    border-radius: clamp(3px, 0.6cqi, 8px);
    overflow: visible;
    font-family: 'Inter', sans-serif;
    font-size: clamp(22px, 7.5cqi, 86px);
    font-weight: 900;
    color: var(--card-text);
  }

  .flip-card .top,
  .flip-card .bottom {
    position: absolute;
    left: 0; right: 0;
    height: 50%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .flip-card .top {
    top: 0;
    background: var(--card-top);
    border-radius: clamp(3px, 0.6cqi, 8px) clamp(3px, 0.6cqi, 8px) 0 0;
    border-bottom: 1px solid var(--card-divider);
    align-items: flex-end;
  }

  .flip-card .top span {
    transform: translateY(50%);
    line-height: 1;
  }

  .flip-card .bottom {
    bottom: 0;
    background: var(--card-bot);
    border-radius: 0 0 clamp(3px, 0.6cqi, 8px) clamp(3px, 0.6cqi, 8px);
    align-items: flex-start;
  }

  .flip-card .bottom span {
    transform: translateY(-50%);
    line-height: 1;
  }

  /* ── Flip animation panels ── */
  .flip-card .flip-top,
  .flip-card .flip-bottom {
    position: absolute;
    left: 0; right: 0;
    height: 50%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    transform-style: preserve-3d;
  }

  .flip-card .flip-top {
    top: 0;
    background: var(--card-top);
    border-radius: clamp(3px, 0.6cqi, 8px) clamp(3px, 0.6cqi, 8px) 0 0;
    border-bottom: 1px solid var(--card-divider);
    transform-origin: bottom center;
    z-index: 2;
    align-items: flex-end;
  }

  .flip-card .flip-top span {
    transform: translateY(50%);
    line-height: 1;
  }

  .flip-card .flip-bottom {
    bottom: 0;
    background: var(--card-bot);
    border-radius: 0 0 clamp(3px, 0.6cqi, 8px) clamp(3px, 0.6cqi, 8px);
    transform-origin: top center;
    transform: rotateX(90deg);
    z-index: 2;
    align-items: flex-start;
  }

  .flip-card .flip-bottom span {
    transform: translateY(-50%);
    line-height: 1;
  }

  .flip-card .flip-shadow {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50%;
    background: rgba(0,0,0,0);
    border-radius: 0 0 clamp(3px, 0.6cqi, 8px) clamp(3px, 0.6cqi, 8px);
    z-index: 1;
    pointer-events: none;
  }

  .flip-card.flipping .flip-top {
    animation: flipTopDown 0.45s ease-in forwards;
  }

  .flip-card.flipping .flip-bottom {
    animation: flipBottomUp 0.45s 0.22s ease-out forwards;
  }

  .flip-card.flipping .flip-shadow {
    animation: shadowPulse 0.45s ease-in forwards;
  }

  @keyframes flipTopDown {
    0%   { transform: rotateX(0deg); }
    100% { transform: rotateX(-90deg); }
  }

  @keyframes flipBottomUp {
    0%   { transform: rotateX(90deg); }
    100% { transform: rotateX(0deg); }
  }

  @keyframes shadowPulse {
    0%   { background: rgba(0,0,0,0); }
    50%  { background: rgba(0,0,0,0.2); }
    100% { background: rgba(0,0,0,0); }
  }

  /* ── Colon separator (two dots) ── */
  .colon {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(6px, 2cqi, 22px);
    /* Vertically center with the cards (not the label) */
    align-self: flex-start;
    height: clamp(28px, 9cqi, 100px);
    /* match card aspect ratio height */
    aspect-ratio: auto;
    padding: 0 clamp(1px, 0.4cqi, 4px);
  }

  /* Recalculate colon height from card dimensions */
  .colon {
    height: calc(clamp(28px, 9cqi, 100px) * 4 / 3);
  }

  .colon-dot {
    width: clamp(4px, 1cqi, 10px);
    height: clamp(4px, 1cqi, 10px);
    border-radius: 50%;
    background: var(--dot-color);
  }

  /* ── Expired ── */
  .widget.is-expired .accent-bar { background: var(--expired-color); }
  .widget.is-expired .title { color: var(--expired-color); }

  /* ── Settings overlay ── */
  .settings-toggle {
    position: absolute;
    top: 8px;
    right: 8px;
    background: none;
    border: none;
    font-size: 18px;
    color: var(--subtitle-color);
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 10;
  }

  .widget:hover .settings-toggle { opacity: 0.6; }
  .settings-toggle:hover { opacity: 1 !important; }

  .settings-panel {
    display: none;
    padding: 16px 20px;
    background: #f5f6f8;
    border-top: 1px solid #e0e3e8;
    margin-top: clamp(12px, 2cqi, 24px);
    border-radius: 6px;
    gap: 10px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .settings-panel.open { display: flex; }

  .settings-panel label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--subtitle-color);
  }

  .settings-panel input[type="text"],
  .settings-panel input[type="datetime-local"] {
    background: #fff;
    border: 1px solid #d0d5dd;
    border-radius: 5px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
    color: var(--title-color);
  }

  .settings-panel input:focus { border-color: var(--accent); }

  .btn-set {
    background: var(--accent-bar);
    border: none;
    border-radius: 5px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 7px 16px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-set:hover { opacity: 0.85; }
</style>
</head>
<body>

<div class="widget" id="widget">
  <div class="accent-bar"></div>

  <button class="settings-toggle" onclick="toggleSettings()" title="Settings">&#9881;</button>

  <div class="title" id="titleText">Countdown</div>
  <div class="subtitle" id="subtitleText"></div>

  <div class="countdown" id="countdown">
    <!-- Days (3 digits) -->
    <div class="digit-group" id="grp-days">
      <div class="digit-row" id="row-days"></div>
      <span class="group-label">Days</span>
    </div>
    <div class="colon"><div class="colon-dot"></div><div class="colon-dot"></div></div>
    <!-- Hours (2 digits) -->
    <div class="digit-group">
      <div class="digit-row" id="row-hours"></div>
      <span class="group-label">Hours</span>
    </div>
    <div class="colon"><div class="colon-dot"></div><div class="colon-dot"></div></div>
    <!-- Minutes (2 digits) -->
    <div class="digit-group">
      <div class="digit-row" id="row-mins"></div>
      <span class="group-label">Minutes</span>
    </div>
    <div class="colon"><div class="colon-dot"></div><div class="colon-dot"></div></div>
    <!-- Seconds (2 digits) -->
    <div class="digit-group">
      <div class="digit-row" id="row-secs"></div>
      <span class="group-label">Seconds</span>
    </div>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <label>Title</label>
    <input type="text" id="inputTitle" placeholder="Title..." />
    <label>Target</label>
    <input type="datetime-local" id="inputDate" />
    <button class="btn-set" onclick="applySettings()">Set</button>
  </div>

  <div class="expired-text" id="expiredText" style="display:none; margin-top:16px; font-weight:700; color:var(--expired-color); letter-spacing:0.08em; text-transform:uppercase; font-size:clamp(10px, 1.6cqi, 16px);">
    Deadline reached
  </div>
</div>

<script>
  const KEY = 'jira_countdown_v3';
  let targetDate = null;
  let titleText  = 'Countdown';

  // ── URL params override everything ──
  const params = new URLSearchParams(window.location.search);
  const paramTitle  = params.get('title');
  const paramTarget = params.get('target');

  // ── Load state: URL params > localStorage ──
  if (paramTarget) {
    targetDate = new Date(paramTarget);
    titleText  = paramTitle || 'Countdown';
  } else {
    try {
      const saved = JSON.parse(localStorage.getItem(KEY) || '{}');
      if (saved.target) {
        targetDate = new Date(saved.target);
        titleText  = saved.title || 'Countdown';
      }
    } catch(e) {}
  }

  if (paramTitle) titleText = paramTitle;

  document.getElementById('titleText').textContent = titleText;

  if (targetDate) {
    document.getElementById('inputDate').value = targetDate.toISOString().slice(0, 16);
    updateSubtitle();
  }
  document.getElementById('inputTitle').value = titleText;

  function save() {
    if (!targetDate) return;
    localStorage.setItem(KEY, JSON.stringify({
      target: targetDate.toISOString(),
      title:  titleText
    }));
  }

  function updateSubtitle() {
    if (!targetDate) return;
    const d = targetDate;
    const day = d.getDate();
    const suffix = [,'st','nd','rd'][day % 10 > 3 ? 0 : (day % 100 - day % 10 !== 10) * (day % 10)] || 'th';
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    document.getElementById('subtitleText').textContent =
      day + suffix + ' ' + monthNames[d.getMonth()] + ' ' + d.getFullYear() + ' ' + hh + ':' + mm;
  }

  function toggleSettings() {
    document.getElementById('settingsPanel').classList.toggle('open');
  }

  function applySettings() {
    const v = document.getElementById('inputDate').value;
    const t = document.getElementById('inputTitle').value.trim();
    if (!v) return;
    targetDate = new Date(v);
    titleText  = t || 'Countdown';
    document.getElementById('titleText').textContent = titleText;
    document.getElementById('settingsPanel').classList.remove('open');
    document.getElementById('widget').classList.remove('is-expired');
    document.getElementById('expiredText').style.display = 'none';
    updateSubtitle();
    save();
    buildCards();
    tick();
  }

  // ── Build individual digit cards dynamically ──
  function makeCard(id) {
    const card = document.createElement('div');
    card.className = 'flip-card';
    card.id = id;
    card.setAttribute('data-value', '0');
    card.innerHTML =
      '<div class="top"><span>0</span></div>' +
      '<div class="bottom"><span>0</span></div>';
    return card;
  }

  function buildCards() {
    // Determine how many day digits we need (minimum 1)
    const diff = targetDate ? Math.max(0, targetDate - new Date()) : 0;
    const totalDays = Math.floor(diff / 86400000);
    const dayDigits = Math.max(1, String(totalDays).length);

    const rowDays  = document.getElementById('row-days');
    const rowHours = document.getElementById('row-hours');
    const rowMins  = document.getElementById('row-mins');
    const rowSecs  = document.getElementById('row-secs');

    rowDays.innerHTML = '';
    rowHours.innerHTML = '';
    rowMins.innerHTML = '';
    rowSecs.innerHTML = '';

    for (let i = 0; i < dayDigits; i++) rowDays.appendChild(makeCard('d-d' + i));
    for (let i = 0; i < 2; i++) rowHours.appendChild(makeCard('d-h' + i));
    for (let i = 0; i < 2; i++) rowMins.appendChild(makeCard('d-m' + i));
    for (let i = 0; i < 2; i++) rowSecs.appendChild(makeCard('d-s' + i));
  }

  // ── Flip a single digit card ──
  function flipDigit(id, newChar) {
    const card = document.getElementById(id);
    if (!card) return;
    const oldChar = card.getAttribute('data-value');
    if (oldChar === newChar) return;

    card.setAttribute('data-value', newChar);
    card.querySelector('.top span').textContent = newChar;
    card.querySelector('.bottom span').textContent = newChar;

    card.querySelectorAll('.flip-top, .flip-bottom, .flip-shadow').forEach(el => el.remove());
    card.classList.remove('flipping');

    const ft = document.createElement('div');
    ft.className = 'flip-top';
    ft.innerHTML = '<span>' + oldChar + '</span>';

    const fb = document.createElement('div');
    fb.className = 'flip-bottom';
    fb.innerHTML = '<span>' + newChar + '</span>';

    const sh = document.createElement('div');
    sh.className = 'flip-shadow';

    card.appendChild(ft);
    card.appendChild(fb);
    card.appendChild(sh);

    void card.offsetWidth;
    card.classList.add('flipping');

    setTimeout(() => {
      card.classList.remove('flipping');
      ft.remove();
      fb.remove();
      sh.remove();
    }, 700);
  }

  // ── Set digits for a group ──
  function setDigits(prefix, value, count) {
    const str = String(value).padStart(count, '0');
    for (let i = 0; i < count; i++) {
      flipDigit(prefix + i, str[i]);
    }
  }

  let dayDigitCount = 1;

  function tick() {
    if (!targetDate) return;

    const now  = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
      setDigits('d-d', 0, dayDigitCount);
      setDigits('d-h', 0, 2);
      setDigits('d-m', 0, 2);
      setDigits('d-s', 0, 2);
      document.getElementById('widget').classList.add('is-expired');
      document.getElementById('expiredText').style.display = 'block';
      return;
    }

    const totalDays = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins  = Math.floor((diff % 3600000) / 60000);
    const secs  = Math.floor((diff % 60000) / 1000);

    // Rebuild cards if day digit count changes
    const needed = Math.max(1, String(totalDays).length);
    if (needed !== dayDigitCount) {
      dayDigitCount = needed;
      buildCards();
    }

    setDigits('d-d', totalDays, dayDigitCount);
    setDigits('d-h', hours, 2);
    setDigits('d-m', mins, 2);
    setDigits('d-s', secs, 2);
  }

  // ── Init ──
  buildCards();
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
