<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #00d9ff;
    --accent2: #ff6b35;
    --text: #e6edf3;
    --muted: #8b949e;
    --tick: #21262d;
    --glow: rgba(0, 217, 255, 0.15);
    --card-top: #1a1f27;
    --card-bot: #222830;
    --card-divider: rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow Condensed', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .widget {
    width: 100%;
    max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  .dot.expired { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .title-input {
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    width: 260px;
    cursor: text;
  }

  .title-input::placeholder { color: var(--muted); }

  .btn-settings {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    font-size: 13px;
    padding: 5px 12px;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }

  .btn-settings:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Flip countdown ── */
  .countdown {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 28px 20px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .flip-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .flip-card {
    position: relative;
    width: 72px;
    height: 80px;
    perspective: 400px;
    border-radius: 6px;
    overflow: visible;
    font-family: 'Share Tech Mono', monospace;
    font-size: 44px;
    font-weight: 700;
    color: var(--text);
  }

  /* Top and bottom static halves */
  .flip-card .top,
  .flip-card .bottom {
    position: absolute;
    left: 0;
    right: 0;
    height: 50%;
    overflow: hidden;
    background: var(--card-top);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .flip-card .top {
    top: 0;
    border-radius: 6px 6px 0 0;
    border-bottom: 1px solid var(--card-divider);
    align-items: flex-end;
    padding-bottom: 0;
  }

  .flip-card .top span {
    transform: translateY(50%);
  }

  .flip-card .bottom {
    bottom: 0;
    background: var(--card-bot);
    border-radius: 0 0 6px 6px;
    align-items: flex-start;
    padding-top: 0;
  }

  .flip-card .bottom span {
    transform: translateY(-50%);
  }

  /* Flip panels (animated) */
  .flip-card .flip-top,
  .flip-card .flip-bottom {
    position: absolute;
    left: 0;
    right: 0;
    height: 50%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    transform-style: preserve-3d;
  }

  .flip-card .flip-top {
    top: 0;
    background: var(--card-top);
    border-radius: 6px 6px 0 0;
    border-bottom: 1px solid var(--card-divider);
    transform-origin: bottom center;
    z-index: 2;
    align-items: flex-end;
  }

  .flip-card .flip-top span {
    transform: translateY(50%);
  }

  .flip-card .flip-bottom {
    bottom: 0;
    background: var(--card-bot);
    border-radius: 0 0 6px 6px;
    transform-origin: top center;
    transform: rotateX(90deg);
    z-index: 2;
    align-items: flex-start;
  }

  .flip-card .flip-bottom span {
    transform: translateY(-50%);
  }

  /* Shadow overlay on bottom half during flip */
  .flip-card .flip-shadow {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: rgba(0,0,0,0);
    border-radius: 0 0 6px 6px;
    z-index: 1;
    pointer-events: none;
  }

  /* Flip animation */
  .flip-card.flipping .flip-top {
    animation: flipTopDown 0.5s ease-in forwards;
  }

  .flip-card.flipping .flip-bottom {
    animation: flipBottomUp 0.5s 0.25s ease-out forwards;
  }

  .flip-card.flipping .flip-shadow {
    animation: shadowPulse 0.5s ease-in forwards;
  }

  @keyframes flipTopDown {
    0%   { transform: rotateX(0deg); }
    100% { transform: rotateX(-90deg); }
  }

  @keyframes flipBottomUp {
    0%   { transform: rotateX(90deg); }
    100% { transform: rotateX(0deg); }
  }

  @keyframes shadowPulse {
    0%   { background: rgba(0,0,0,0); }
    50%  { background: rgba(0,0,0,0.25); }
    100% { background: rgba(0,0,0,0); }
  }

  .flip-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }

  .flip-separator {
    font-family: 'Share Tech Mono', monospace;
    font-size: 36px;
    color: var(--border);
    margin-top: -12px;
    user-select: none;
  }

  /* ── Progress bar ── */
  .progress-row {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .progress-track {
    height: 4px;
    background: var(--tick);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #0099bb);
    border-radius: 2px;
    transition: width 1s linear;
    box-shadow: 0 0 8px var(--glow);
  }

  /* ── Footer / date picker ── */
  .footer {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .footer label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .date-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
    flex: 1;
    max-width: 230px;
    transition: border-color 0.2s;
    color-scheme: dark;
  }

  .date-input:focus { border-color: var(--accent); }

  .btn-set {
    background: var(--accent);
    border: none;
    border-radius: 5px;
    color: var(--bg);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 7px 16px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-set:hover { opacity: 0.85; }

  /* ── Expired state ── */
  .expired-banner {
    display: none;
    padding: 14px 20px;
    background: rgba(255, 107, 53, 0.08);
    border-top: 1px solid rgba(255, 107, 53, 0.3);
    text-align: center;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent2);
    font-weight: 700;
  }

  .widget.is-expired .expired-banner { display: block; }
  .widget.is-expired .dot { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: none; }
  .widget.is-expired .progress-fill { background: var(--accent2); }

  /* ── Responsive ── */
  @media (max-width: 500px) {
    .countdown { gap: 8px; padding: 20px 12px; }
    .flip-card { width: 52px; height: 60px; font-size: 30px; }
    .flip-separator { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="widget" id="widget">

  <div class="header">
    <div class="header-left">
      <div class="dot" id="dot"></div>
      <input class="title-input" id="titleInput" type="text" value="Sprint End" maxlength="40" placeholder="Enter label…" />
    </div>
    <button class="btn-settings" onclick="toggleFooter()">&#9881; Set Target</button>
  </div>

  <div class="countdown" id="countdown">
    <div class="flip-group">
      <div class="flip-card" id="fc-months" data-value="00">
        <div class="top"><span>00</span></div>
        <div class="bottom"><span>00</span></div>
      </div>
      <span class="flip-label">Months</span>
    </div>
    <span class="flip-separator">:</span>
    <div class="flip-group">
      <div class="flip-card" id="fc-weeks" data-value="00">
        <div class="top"><span>00</span></div>
        <div class="bottom"><span>00</span></div>
      </div>
      <span class="flip-label">Weeks</span>
    </div>
    <span class="flip-separator">:</span>
    <div class="flip-group">
      <div class="flip-card" id="fc-days" data-value="00">
        <div class="top"><span>00</span></div>
        <div class="bottom"><span>00</span></div>
      </div>
      <span class="flip-label">Days</span>
    </div>
    <span class="flip-separator">:</span>
    <div class="flip-group">
      <div class="flip-card" id="fc-hours" data-value="00">
        <div class="top"><span>00</span></div>
        <div class="bottom"><span>00</span></div>
      </div>
      <span class="flip-label">Hours</span>
    </div>
    <span class="flip-separator">:</span>
    <div class="flip-group">
      <div class="flip-card" id="fc-mins" data-value="00">
        <div class="top"><span>00</span></div>
        <div class="bottom"><span>00</span></div>
      </div>
      <span class="flip-label">Mins</span>
    </div>
    <span class="flip-separator">:</span>
    <div class="flip-group">
      <div class="flip-card" id="fc-secs" data-value="00">
        <div class="top"><span>00</span></div>
        <div class="bottom"><span>00</span></div>
      </div>
      <span class="flip-label">Secs</span>
    </div>
  </div>

  <div class="progress-row">
    <div class="progress-meta">
      <span id="startLabel">Started</span>
      <span id="pctLabel">0% elapsed</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="footer" id="footerPanel" style="display:none">
    <label for="dateInput">Target</label>
    <input class="date-input" type="datetime-local" id="dateInput" />
    <button class="btn-set" onclick="applyTarget()">Set</button>
  </div>

  <div class="expired-banner">&#9873; Deadline reached</div>
</div>

<script>
  const PAD = n => String(Math.floor(n)).padStart(2, '0');
  const KEY = 'jira_countdown_v2';

  let targetDate = null;
  let startDate  = null;

  // ── Load persisted state ──
  try {
    const saved = JSON.parse(localStorage.getItem(KEY) || '{}');
    if (saved.target) {
      targetDate = new Date(saved.target);
      startDate  = saved.start ? new Date(saved.start) : new Date();
      document.getElementById('titleInput').value = saved.title || 'Sprint End';
      document.getElementById('dateInput').value   = saved.target.slice(0, 16);
    }
  } catch(e) {}

  function save() {
    if (!targetDate) return;
    localStorage.setItem(KEY, JSON.stringify({
      target: targetDate.toISOString(),
      start:  startDate?.toISOString(),
      title:  document.getElementById('titleInput').value
    }));
  }

  document.getElementById('titleInput').addEventListener('input', save);

  function toggleFooter() {
    const fp = document.getElementById('footerPanel');
    fp.style.display = fp.style.display === 'none' ? 'flex' : 'none';
  }

  function applyTarget() {
    const v = document.getElementById('dateInput').value;
    if (!v) return;
    targetDate = new Date(v);
    startDate  = new Date();
    document.getElementById('footerPanel').style.display = 'none';
    document.getElementById('widget').classList.remove('is-expired');
    save();
    tick();
  }

  // ── Flip a card to a new value ──
  function flipTo(id, newVal) {
    const card = document.getElementById('fc-' + id);
    const oldVal = card.getAttribute('data-value');
    if (oldVal === newVal) return;

    card.setAttribute('data-value', newVal);

    // Static halves show the new value underneath
    card.querySelector('.top span').textContent = newVal;
    card.querySelector('.bottom span').textContent = newVal;

    // Remove any previous flip panels
    card.querySelectorAll('.flip-top, .flip-bottom, .flip-shadow').forEach(el => el.remove());
    card.classList.remove('flipping');

    // Create flip-top (shows old value, flips away)
    const flipTop = document.createElement('div');
    flipTop.className = 'flip-top';
    flipTop.innerHTML = '<span>' + oldVal + '</span>';

    // Create flip-bottom (shows new value, flips in)
    const flipBot = document.createElement('div');
    flipBot.className = 'flip-bottom';
    flipBot.innerHTML = '<span>' + newVal + '</span>';

    // Shadow overlay
    const shadow = document.createElement('div');
    shadow.className = 'flip-shadow';

    card.appendChild(flipTop);
    card.appendChild(flipBot);
    card.appendChild(shadow);

    // Trigger animation
    void card.offsetWidth;
    card.classList.add('flipping');

    // Cleanup after animation
    setTimeout(() => {
      card.classList.remove('flipping');
      flipTop.remove();
      flipBot.remove();
      shadow.remove();
    }, 800);
  }

  function tick() {
    if (!targetDate) return;

    const now  = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
      ['months','weeks','days','hours','mins','secs'].forEach(k => {
        flipTo(k, '00');
      });
      document.getElementById('widget').classList.add('is-expired');
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('pctLabel').textContent = '100% elapsed';
      return;
    }

    document.getElementById('widget').classList.remove('is-expired');

    // Decompose
    let rem = diff;
    const months = Math.floor(rem / (1000 * 60 * 60 * 24 * 30.4375));
    rem -= months * (1000 * 60 * 60 * 24 * 30.4375);
    const weeks  = Math.floor(rem / (1000 * 60 * 60 * 24 * 7));
    rem -= weeks  * (1000 * 60 * 60 * 24 * 7);
    const days   = Math.floor(rem / (1000 * 60 * 60 * 24));
    rem -= days   * (1000 * 60 * 60 * 24);
    const hours  = Math.floor(rem / (1000 * 60 * 60));
    rem -= hours  * (1000 * 60 * 60);
    const mins   = Math.floor(rem / (1000 * 60));
    rem -= mins   * (1000 * 60);
    const secs   = Math.floor(rem / 1000);

    flipTo('months', PAD(months));
    flipTo('weeks',  PAD(weeks));
    flipTo('days',   PAD(days));
    flipTo('hours',  PAD(hours));
    flipTo('mins',   PAD(mins));
    flipTo('secs',   PAD(secs));

    // Progress bar
    if (startDate) {
      const total   = targetDate - startDate;
      const elapsed = now - startDate;
      const pct     = Math.min(100, Math.max(0, (elapsed / total) * 100));
      document.getElementById('progressFill').style.width = pct.toFixed(2) + '%';
      document.getElementById('pctLabel').textContent     = pct.toFixed(1) + '% elapsed';
      document.getElementById('startLabel').textContent   =
        'From ' + startDate.toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
    }
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
